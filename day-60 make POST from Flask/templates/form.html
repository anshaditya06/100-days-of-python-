<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background-color: #f0f4f8; }
    .form-card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      max-width: 560px;
      margin: 60px auto;
    }
  </style>
</head>
<body>
<div class="form-card">
  <h2 class="fw-bold mb-1">Create Account</h2>
  <p class="text-muted mb-4" style="font-size:0.9rem">Fill in the details below.</p>

  <!-- action="/submit" matches @app.route('/submit') in app.py -->
  <form action="/submit" method="POST">

    <div class="row g-3 mb-3">
      <div class="col-6">
        <label class="form-label fw-semibold">First Name</label>
        <input type="text" class="form-control" name="first_name"  required/>
      </div>
      <div class="col-6">
        <label class="form-label fw-semibold">Last Name</label>
        <input type="text" class="form-control" name="last_name"  required/>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Email</label>
      <input type="email" class="form-control" name="email" placeholder="you@example.com" required/>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Password</label>
      <input type="password" class="form-control" name="password" placeholder="Min. 8 characters" required/>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Role</label>
      <select class="form-select" name="role">
        <option value="" disabled selected>Select a role</option>
        <option value="student">Student</option>
        <option value="developer">Developer</option>
        <option value="designer">Designer</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold d-block">Gender</label>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="gender" value="male"/>
        <label class="form-check-label">Male</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="gender" value="female"/>
        <label class="form-check-label">Female</label>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Bio</label>
      <textarea class="form-control" name="bio" rows="3" placeholder="Tell us about yourself..."></textarea>
    </div>

    <div class="mb-4">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="terms" required/>
        <label class="form-check-label">I agree to the Terms & Conditions</label>
      </div>
    </div>

    <div class="d-grid">
      <button type="submit" class="btn btn-primary fw-semibold py-2">Create Account</button>
    </div>

  </form>
</div>
</body>
</html>
