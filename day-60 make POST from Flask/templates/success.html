<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Success</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background-color: #f0f4f8; }
    .card {
      max-width: 500px;
      margin: 80px auto;
      border-radius: 16px;
      border: none;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      padding: 2.5rem;
    }
    .badge-pill {
      border-radius: 999px;
      padding: 0.4rem 1rem;
    }
  </style>
</head>
<body>
<div class="card">
  <!-- user.name comes from user_data dict in app.py -->
  <h2 class="fw-bold mb-1">👋 Hello, {{ user.name }}!</h2>
  <p class="text-muted mb-4">Here's what we received:</p>

  <ul class="list-group list-group-flush">
    <li class="list-group-item d-flex justify-content-between">
      <span class="text-muted">Email</span>
      <strong>{{ user.email }}</strong>
    </li>
    <li class="list-group-item d-flex justify-content-between">
      <span class="text-muted">Role</span>
      <strong>{{ user.role }}</strong>
    </li>
    <li class="list-group-item d-flex justify-content-between">
      <span class="text-muted">Gender</span>
      <strong>{{ user.gender }}</strong>
    </li>
    <li class="list-group-item d-flex justify-content-between">
      <span class="text-muted">Terms</span>
      <strong>{{ user.terms }}</strong>
    </li>
    <li class="list-group-item">
      <span class="text-muted d-block mb-1">Bio</span>
      <strong>{{ user.bio or 'Not provided' }}</strong>
    </li>
  </ul>

  <a href="/" class="btn btn-outline-primary mt-4 w-100">← Back to Form</a>
</div>
</body>
</html>
